services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: be-modami-auth-service
      POSTGRES_USER: modami
      POSTGRES_PASSWORD: modami
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U modami -d be-modami-auth-service"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/be-modami-auth-service
      KC_DB_USERNAME: modami
      KC_DB_PASSWORD: modami
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8180:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
