services:
  mongo:
    image: mongo:8
    container_name: mongo
    restart: unless-stopped
    entrypoint: >
      bash -c "
        mongod --replSet rs0 --bind_ip_all &
        until mongosh --quiet --eval 'db.adminCommand(\"ping\")' > /dev/null 2>&1; do sleep 1; done
        mongosh --quiet --eval '
          try { rs.status(); print(\"Replica set already initialized\"); }
          catch(e) {
            rs.initiate({ _id: \"rs0\", members: [{ _id: 0, host: \"mongo:27017\" }] });
            print(\"Replica set initialized\");
          }
        '
        wait
      "
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "rs.status().ok === 1 || quit(1)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
      
  minio:
    image: minio/minio:RELEASE.2023-12-02T10-51-33Z-cpuv1
    container_name: minio
    command: server --console-address ":9001" /data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
      - "9002:9000"  # Avoid conflict with OrbStack
      - "9003:9001"  # Console port
    volumes:
      - minio_data:/data
    labels:
      traefik.enable: true
      traefik.docker.network: modami-network

      # API Endpoint
      traefik.http.routers.minio-api.rule: Host(`modami-auth.techinsightsworld.com`)
      traefik.http.routers.minio-api.entrypoints: http
      traefik.http.routers.minio-api.middlewares: https-redirect
      traefik.http.routers.minio-api.service: minio-api-service`

      traefik.http.routers.minio-api-secure.rule: Host(`modami-auth.techinsightsworld.com`)
      traefik.http.routers.minio-api-secure.entrypoints: https
      traefik.http.routers.minio-api-secure.tls: true
      traefik.http.routers.minio-api-secure.tls.certresolver: le
      traefik.http.routers.minio-api-secure.service: minio-api-service

      traefik.http.services.minio-api-service.loadbalancer.server.port: 9000

      # Console Endpoint
      traefik.http.routers.minio-console.rule: Host(`modami-auth.techinsightsworld.com`)
      traefik.http.routers.minio-console.entrypoints: http
      traefik.http.routers.minio-console.middlewares: https-redirect
      traefik.http.routers.minio-console.service: minio-console-service

      traefik.http.routers.minio-console-secure.rule: Host(`minio-console.example.com`)
      traefik.http.routers.minio-console-secure.entrypoints: https
      traefik.http.routers.minio-console-secure.tls: true
      traefik.http.routers.minio-console-secure.tls.certresolver: le
      traefik.http.routers.minio-console-secure.service: minio-console-service

      traefik.http.services.minio-console-service.loadbalancer.server.port: 9001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.1
    hostname: zookeeper
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "nc", "-z", "localhost", "2181" ]
      interval: 10s
      timeout: 5s
      retries: 5

  broker:
    image: confluentinc/cp-kafka:7.3.1
    hostname: broker
    container_name: broker
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "29092:29092"
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:29092,PLAINTEXT_HOST://localhost:9092
      CONNECT_KEY_CONVERTER: 'org.apache.kafka.connect.json.JsonConverter'
      CONNECT_VALUE_CONVERTER: 'org.apache.kafka.connect.json.JsonConverter'
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: 'false'
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: 'false'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
    volumes:
      - broker_data:/var/lib/kafka/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "kafka-topics --bootstrap-server broker:29092 --list" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  console:
    container_name: redpanda_console
    image: docker.redpanda.com/redpandadata/console:v2.5.1
    environment:
      KAFKA_BROKERS: "broker:29092"
      CONSOLE_TOPIC_PUBLISH_ENABLED: "true"
      CONSOLE_TOPIC_CREATE_ENABLED: "true"
      CONSOLE_TOPIC_DELETE_ENABLED: "true"
      CONSOLE_READONLY: "false"
    ports:
      - 8089:8080
    depends_on: [ broker ]
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/be-modami-auth-service
      KC_DB_USERNAME: modami
      KC_DB_PASSWORD: modami
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8180:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    container_name: elasticsearch
    environment:
      - node.name=elasticsearch
      - cluster.name=cluster
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
      - "9300:9300"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  kibana:
    image: docker.elastic.co/kibana/kibana:8.14.3
    container_name: kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    volumes:
      - kibana_data:/usr/share/kibana/data
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.103.1
    container_name: otel_collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./config/otel-collector.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "8888:8888"   # Prometheus metrics
      - "8889:8889"   # Prometheus exporter
      - "13133:13133" # Health check
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:13133/"]
      interval: 30s
      timeout: 10s
      retries: 5

  scylladb-node1:
    image: scylladb/scylla:6.2
    container_name: scylladb-node1
    command: --smp 1 --memory 512M --developer-mode 1 --seeds scylladb-node1 --endpoint-snitch GossipingPropertyFileSnitch
    ports:
      - "9042:9042"   # CQL
      - "9160:9160"   # Thrift
      - "10000:10000" # REST API
    volumes:
      - scylladb_node1_data:/var/lib/scylla
      - ./deploy/scylladb/cassandra-rackdc.properties:/etc/scylla/cassandra-rackdc.properties:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  scylladb-node2:
    image: scylladb/scylla:6.2
    container_name: scylladb-node2
    command: --smp 1 --memory 512M --developer-mode 1 --seeds scylladb-node1 --endpoint-snitch GossipingPropertyFileSnitch
    volumes:
      - scylladb_node2_data:/var/lib/scylla
      - ./deploy/scylladb/cassandra-rackdc.properties:/etc/scylla/cassandra-rackdc.properties:ro
    restart: unless-stopped
    depends_on:
      scylladb-node1:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  scylladb-node3:
    image: scylladb/scylla:6.2
    container_name: scylladb-node3
    command: --smp 1 --memory 512M --developer-mode 1 --seeds scylladb-node1 --endpoint-snitch GossipingPropertyFileSnitch
    volumes:
      - scylladb_node3_data:/var/lib/scylla
      - ./deploy/scylladb/cassandra-rackdc.properties:/etc/scylla/cassandra-rackdc.properties:ro
    restart: unless-stopped
    depends_on:
      scylladb-node2:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  centrifugo:
    image: centrifugo/centrifugo:v5
    container_name: centrifugo
    command: centrifugo -c /centrifugo/config.json
    ports:
      - "8000:8000"
    volumes:
      - ./deploy/centrifugo/config.local.json:/centrifugo/config.json:ro
    environment:
      # Local-only defaults; replace in real environments
      CENTRIFUGO_HMAC_SECRET: "local-dev-token-secret"
      CENTRIFUGO_API_KEY: "CHANGE_ME_API_KEY"
      CENTRIFUGO_ADMIN_PASSWORD: "CHANGE_ME_ADMIN_PASSWORD"
      CENTRIFUGO_ADMIN_SECRET: "CHANGE_ME_ADMIN_SECRET"
    restart: unless-stopped

volumes:
  mongo_data:
    driver: local
  minio_data:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local
  zookeeper_data:
    driver: local
  zookeeper_log:
    driver: local
  broker_data:
    driver: local
  keycloak_data:
    driver: local
  elasticsearch_data:
    driver: local
  kibana_data:
    driver: local
  scylladb_node1_data:
    driver: local
  scylladb_node2_data:
    driver: local
  scylladb_node3_data:
    driver: local