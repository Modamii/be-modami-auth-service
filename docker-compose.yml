services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cenfit_auth
      POSTGRES_USER: cenfit
      POSTGRES_PASSWORD: cenfit
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cenfit -d cenfit_auth"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/cenfit_auth
      KC_DB_USERNAME: cenfit
      KC_DB_PASSWORD: cenfit
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8180:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
