basePath: /v1/auth-services
definitions:
  apperror.Code:
    enum:
    - BAD_REQUEST
    - UNAUTHORIZED
    - FORBIDDEN
    - NOT_FOUND
    - METHOD_NOT_ALLOWED
    - NOT_ACCEPTABLE
    - REQUEST_TIMEOUT
    - CONFLICT
    - GONE
    - PRECONDITION_FAILED
    - PAYLOAD_TOO_LARGE
    - UNSUPPORTED_MEDIA_TYPE
    - VALIDATION_ERROR
    - UNPROCESSABLE_ENTITY
    - LOCKED
    - FAILED_DEPENDENCY
    - PRECONDITION_REQUIRED
    - TOO_MANY_REQUESTS
    - INTERNAL_ERROR
    - NOT_IMPLEMENTED
    - BAD_GATEWAY
    - SERVICE_UNAVAILABLE
    - TIMEOUT
    - CACHE_MISS
    - CACHE_ERROR
    - MESSAGE_BUS_ERROR
    type: string
    x-enum-varnames:
    - CodeBadRequest
    - CodeUnauthorized
    - CodeForbidden
    - CodeNotFound
    - CodeMethodNotAllowed
    - CodeNotAcceptable
    - CodeRequestTimeout
    - CodeConflict
    - CodeGone
    - CodePrecondFailed
    - CodePayloadTooLarge
    - CodeUnsupportedMedia
    - CodeValidation
    - CodeUnprocessable
    - CodeLocked
    - CodeFailedDependency
    - CodePrecondRequired
    - CodeTooManyRequest
    - CodeInternal
    - CodeNotImplemented
    - CodeBadGateway
    - CodeServiceUnavail
    - CodeTimeout
    - CodeCacheMiss
    - CodeCacheError
    - CodeMessageBus
  be-modami-auth-service_internal_delivery_http_dto.ResetPasswordRequest:
    properties:
      new_password:
        minLength: 8
        type: string
      reset_token:
        type: string
    required:
    - new_password
    - reset_token
    type: object
  be-modami-auth-service_internal_delivery_http_dto.SendOTPRequest:
    properties:
      email:
        type: string
      purpose:
        enum:
        - register
        - forgot-password
        - change-email
        type: string
    required:
    - email
    - purpose
    type: object
  be-modami-auth-service_internal_delivery_http_dto.VerifyOTPRequest:
    properties:
      email:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      otp:
        type: string
      password:
        type: string
      purpose:
        enum:
        - register
        - forgot-password
        - change-email
        type: string
      username:
        description: Register-only
        type: string
    required:
    - email
    - otp
    - purpose
    type: object
  be-modami-auth-service_internal_entity.ChangePasswordRequest:
    properties:
      new_password:
        example: newSecret123
        minLength: 8
        type: string
      old_password:
        example: oldSecret123
        type: string
    required:
    - new_password
    - old_password
    type: object
  be-modami-auth-service_internal_entity.ForgotPasswordRequest:
    properties:
      email:
        example: john@example.com
        type: string
    required:
    - email
    type: object
  be-modami-auth-service_internal_entity.LoginRequest:
    properties:
      password:
        example: secret123
        type: string
      username:
        example: john
        type: string
    required:
    - password
    - username
    type: object
  be-modami-auth-service_internal_entity.LoginResponse:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
      refresh_token:
        type: string
      token_type:
        type: string
    type: object
  be-modami-auth-service_internal_entity.LogoutRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  be-modami-auth-service_internal_entity.RefreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  be-modami-auth-service_internal_entity.RegisterRequest:
    properties:
      email:
        example: john@example.com
        type: string
      first_name:
        example: John
        type: string
      last_name:
        example: Doe
        type: string
      password:
        example: secret123
        minLength: 8
        type: string
      username:
        example: john
        type: string
    required:
    - email
    - password
    - username
    type: object
  be-modami-auth-service_internal_entity.RegisterResponse:
    properties:
      user_id:
        type: string
    type: object
  be-modami-auth-service_internal_entity.SocialLoginResponse:
    properties:
      auth_url:
        type: string
    type: object
  gocloak.CompositesRepresentation:
    properties:
      client:
        additionalProperties:
          items:
            type: string
          type: array
        type: object
      realm:
        items:
          type: string
        type: array
    type: object
  gocloak.Role:
    properties:
      attributes:
        additionalProperties:
          items:
            type: string
          type: array
        type: object
      clientRole:
        type: boolean
      composite:
        type: boolean
      composites:
        $ref: '#/definitions/gocloak.CompositesRepresentation'
      containerId:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      scopeParamRequired:
        type: boolean
    type: object
  internal_delivery_http_handler.assignRolesRequest:
    properties:
      roles:
        items:
          $ref: '#/definitions/gocloak.Role'
        type: array
    required:
    - roles
    type: object
  response.ErrorBody:
    properties:
      code:
        $ref: '#/definitions/apperror.Code'
      detail:
        type: string
      errors:
        items:
          $ref: '#/definitions/response.FieldError'
        type: array
      message:
        type: string
    type: object
  response.FieldError:
    properties:
      field:
        type: string
      message:
        type: string
    type: object
  response.Meta:
    properties:
      pagination:
        $ref: '#/definitions/response.Pagination'
      request_id:
        type: string
      timestamp:
        type: integer
    type: object
  response.Pagination:
    properties:
      has_next:
        type: boolean
      has_prev:
        type: boolean
      page:
        type: integer
      per_page:
        type: integer
      total_items:
        type: integer
      total_pages:
        type: integer
    type: object
  response.Response:
    properties:
      data: {}
      error:
        $ref: '#/definitions/response.ErrorBody'
      meta:
        $ref: '#/definitions/response.Meta'
      success:
        type: boolean
    type: object
host: modami-auth.techinsightsworld.com
info:
  contact: {}
  description: Authentication service for the Modami marketplace platform.
  title: Modami Auth Service API
  version: "1.0"
paths:
  /admin/roles:
    get:
      description: Returns all realm roles from Keycloak (admin only)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: List realm roles
      tags:
      - admin
  /admin/users/{id}/roles:
    delete:
      consumes:
      - application/json
      description: Remove realm roles from a specific user (admin only)
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: Roles to remove
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_delivery_http_handler.assignRolesRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Remove roles from user
      tags:
      - admin
    get:
      description: Returns realm roles assigned to a specific user (admin only)
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Get user roles
      tags:
      - admin
    post:
      consumes:
      - application/json
      description: Assign realm roles to a specific user (admin only)
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: Roles to assign
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_delivery_http_handler.assignRolesRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Assign roles to user
      tags:
      - admin
  /auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Send a password reset email to the user
      parameters:
      - description: User email
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/be-modami-auth-service_internal_entity.ForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
      summary: Forgot password
      tags:
      - auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user with username and password, returns JWT tokens
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/be-modami-auth-service_internal_entity.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/be-modami-auth-service_internal_entity.LoginResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
      summary: User login
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Invalidate refresh token to end the session
      parameters:
      - description: Refresh token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/be-modami-auth-service_internal_entity.LogoutRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
      summary: Logout user
      tags:
      - auth
  /auth/otp/send:
    post:
      consumes:
      - application/json
      description: 'Send OTP to the given email. Purpose: register, forgot-password,
        change-email.'
      parameters:
      - description: Email and purpose
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/be-modami-auth-service_internal_delivery_http_dto.SendOTPRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: Send OTP
      tags:
      - otp
  /auth/otp/verify:
    post:
      consumes:
      - application/json
      description: 'Verify OTP. Response depends on purpose: register returns tokens,
        forgot-password returns reset_token, change-email returns success.'
      parameters:
      - description: Email, OTP, purpose, and optional fields
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/be-modami-auth-service_internal_delivery_http_dto.VerifyOTPRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: Verify OTP
      tags:
      - otp
  /auth/password:
    put:
      consumes:
      - application/json
      description: Change the authenticated user's password
      parameters:
      - description: Password change data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/be-modami-auth-service_internal_entity.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Change password
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Exchange refresh token for a new access token
      parameters:
      - description: Refresh token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/be-modami-auth-service_internal_entity.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/be-modami-auth-service_internal_entity.LoginResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
      summary: Refresh access token
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Create a new user account in Keycloak
      parameters:
      - description: Registration data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/be-modami-auth-service_internal_entity.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/be-modami-auth-service_internal_entity.RegisterResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.Response'
      summary: Register new user
      tags:
      - auth
  /auth/reset-password:
    post:
      consumes:
      - application/json
      description: Use the one-time reset token (from forgot-password verify) to set
        a new password
      parameters:
      - description: Reset token and new password
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/be-modami-auth-service_internal_delivery_http_dto.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: Reset password with reset token
      tags:
      - auth
  /auth/social/callback:
    get:
      description: Exchanges the authorization code from Keycloak for JWT tokens
      parameters:
      - description: Authorization code
        in: query
        name: code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/be-modami-auth-service_internal_entity.LoginResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
      summary: Social login callback
      tags:
      - auth
  /auth/social/login:
    get:
      description: Returns the Keycloak authorization URL for the given social provider
      parameters:
      - description: Social provider (google, facebook, github)
        in: query
        name: provider
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/be-modami-auth-service_internal_entity.SocialLoginResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
      summary: Social login
      tags:
      - auth
  /healthz:
    get:
      description: Returns 200 if the service is running
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Liveness check
      tags:
      - health
  /readyz:
    get:
      description: Returns 200 if all dependencies (DB, Keycloak) are healthy
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Readiness check
      tags:
      - health
securityDefinitions:
  BearerAuth:
    description: 'Enter your token in the format: **Bearer {token}**'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
